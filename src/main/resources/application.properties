spring.application.name=solar-calc

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/solar_calc}
spring.datasource.username=${DATABASE_USERNAME:solar_user}
spring.datasource.password=${DATABASE_PASSWORD:solar123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File upload (para imagens da conta de luz)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OpenRouter Vision — obtenha sua chave gratuita em https://openrouter.ai/keys
openrouter.api.key=${OPENROUTER_API_KEY:}
